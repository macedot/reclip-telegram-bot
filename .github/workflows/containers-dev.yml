name: Build and Push Dev Containers

# Dev-branch container images. Mirrors release.yml's proven pattern but
# tags every build uniquely so every dev commit is pullable / auditable.
on:
  push:
    branches: [dev]

# packages: write is required to push to GHCR.
permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [reclip, bot, dashboard]
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4

      - name: Login to GHCR
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Lowercase repository
        id: repo
        run: echo "repo=$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      # dev tag derives from the commit SHA so every push produces a
      # unique, addressable image. Format: dev-<7-char short SHA>.
      - name: Compute dev tag
        id: tag
        run: echo "tag=dev-${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Build and push ${{ matrix.service }}
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7
        with:
          context: ./${{ matrix.service }}
          push: true
          tags: ghcr.io/${{ steps.repo.outputs.repo }}/${{ matrix.service }}:${{ steps.tag.outputs.tag }}
