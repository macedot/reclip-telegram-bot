services:
  reclip:
    image: ghcr.io/${GHCR_OWNER:?GHCR_OWNER must be set}/reclip-telegram-bot/reclip:${IMAGE_TAG:-latest}
    build: ./reclip
    environment:
      - HOST=0.0.0.0
      - PORT=8899
      - MAX_CONCURRENT_DOWNLOADS=${MAX_CONCURRENT_DOWNLOADS:-3}
      - DOWNLOAD_TIMEOUT=${DOWNLOAD_TIMEOUT:-900}
      - MAX_JOBS=${MAX_JOBS:-1000}
      - MAX_FILESIZE=${MAX_FILESIZE:-2G}
      - MIN_FREE_DISK_MB=${MIN_FREE_DISK_MB:-1024}
      - DOWNLOADS_PATH=/downloads
      - RECLIP_DB_PATH=${RECLIP_DB_PATH:-/data/reclip_jobs.db}
      - JOB_TTL_SECONDS=${JOB_TTL_SECONDS:-604800}
      - SWEEP_INTERVAL_SECONDS=${SWEEP_INTERVAL_SECONDS:-3600}
      - STALE_DOWNLOAD_SECONDS=${STALE_DOWNLOAD_SECONDS:-60}
      # C2 — shared token required for /api/*
      - RECLIP_API_TOKEN=${RECLIP_API_TOKEN:?RECLIP_API_TOKEN must be set}
    volumes:
      - downloads:/downloads
      - reclip-data:/data
    networks:
      - internal
    restart: unless-stopped

  bot:
    image: ghcr.io/${GHCR_OWNER:?GHCR_OWNER must be set}/reclip-telegram-bot/bot:${IMAGE_TAG:-latest}
    build: ./bot
    environment:
      - BOT_TOKEN=${BOT_TOKEN}
      - RECLIP_URL=http://reclip:8899
      # C2 — bot must send this when calling reclip /api/*
      - RECLIP_API_TOKEN=${RECLIP_API_TOKEN:?RECLIP_API_TOKEN must be set}
      - TELEGRAM_BOT_API_URL=http://telegram-bot-api:8081
      - DOWNLOADS_PATH=/downloads
      - CLEANUP_MAX_AGE_HOURS=${CLEANUP_MAX_AGE_HOURS:-1}
      - CLEANUP_MAX_DISK_MB=${CLEANUP_MAX_DISK_MB:-5000}
      - CLEANUP_INTERVAL_SECONDS=${CLEANUP_INTERVAL_SECONDS:-300}
      - DASHBOARD_URL=http://dashboard:8080
      # C4 — bot must send this when POSTing to /api/events
      - DASHBOARD_INTERNAL_TOKEN=${DASHBOARD_INTERNAL_TOKEN:?DASHBOARD_INTERNAL_TOKEN must be set}
      # H5 — Telegram user allowlist (fail-closed when empty)
      - ALLOWED_USER_IDS=${ALLOWED_USER_IDS:-}
    volumes:
      - downloads:/downloads
    depends_on:
      - reclip
      - telegram-bot-api
    networks:
      - internal
    restart: unless-stopped

  telegram-bot-api:
    # DF-6 — pinned to a major.minor (no :latest)
    image: aiogram/telegram-bot-api:7.7
    environment:
      - TELEGRAM_API_ID=${TELEGRAM_API_ID}
      - TELEGRAM_API_HASH=${TELEGRAM_API_HASH}
      - TELEGRAM_LOCAL=true
    volumes:
      - telegram-bot-api-data:/var/lib/telegram-bot-api
    networks:
      - internal
    restart: unless-stopped

  dashboard:
    image: ghcr.io/${GHCR_OWNER:?GHCR_OWNER must be set}/reclip-telegram-bot/dashboard:${IMAGE_TAG:-latest}
    build: ./dashboard
    environment:
      # N3 — admin username required; default 'admin' is rejected by code
      - ADMIN_USER=${DASHBOARD_USER:?DASHBOARD_USER must be set}
      # H7 — bcrypt hash required (not plaintext)
      - ADMIN_PASSWORD_HASH=${DASHBOARD_PASSWORD_HASH:?DASHBOARD_PASSWORD_HASH must be set}
      - DB_PATH=/data/reclip_bot.db
      - DOWNLOADS_PATH=/downloads
      - RECLIP_URL=http://reclip:8899
      # C3 — fail-closed on SECRET_KEY
      - SECRET_KEY=${DASHBOARD_SECRET_KEY:?DASHBOARD_SECRET_KEY must be set}
      # C4 — shared token for /api/events
      - DASHBOARD_INTERNAL_TOKEN=${DASHBOARD_INTERNAL_TOKEN:?DASHBOARD_INTERNAL_TOKEN must be set}
      - MAX_ACTIVE_DOWNLOADS=${MAX_ACTIVE_DOWNLOADS:-256}
      - LOGIN_RATE_LIMIT=${LOGIN_RATE_LIMIT:-5/minute}
      - CLEANUP_MAX_DISK_MB=${CLEANUP_MAX_DISK_MB:-5000}
      - DASHBOARD_SECURE_COOKIES=${DASHBOARD_SECURE_COOKIES:-true}
    volumes:
      - dashboard-data:/data
      - downloads:/downloads:ro
    ports:
      - "${DASHBOARD_PORT:-8080}:8080"
    depends_on:
      - reclip
    networks:
      - internal
    restart: unless-stopped

  # Optional: expose reclip web UI on host
  # Uncomment to access web UI at http://localhost:8899
  # reclip-web:
  #   extends:
  #     service: reclip
  #   ports:
  #     - "${RECLIP_WEB_PORT:-8899}:8899"
  #   networks:
  #     - internal

volumes:
  downloads:
  telegram-bot-api-data:
  dashboard-data:
  reclip-data:

networks:
  internal:
    driver: bridge
